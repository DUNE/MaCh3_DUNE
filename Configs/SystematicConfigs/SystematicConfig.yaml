# This is the config containing information about your systematics!
# Once you've you've defined your systematics here, you can list this file in the "XsecCovFile" entry of the "General" section of your RunConfig.yaml

# All systematic configs begin with a top level "Systematics"
Systematics:
  # Now for each systematic we put it under a "Systematic" entry
  - Systematic:
      # We can group parameters with a label (flux, xsec, osc, etc.). For now we'll say this is an xsec parameter
      ParameterGroup: Xsec  

      # MaCh3 can have multiple names for the same systematic.
      Names:
        # We will be using "FancyName"
        FancyName: # <Your name here>
      
      #  Now we need to define some more  properties of the systematic:
      #  These are:
      #  Error: This is the prior error (assuming it's gaussian)
      #         For now let's make this 0.1

      #  Parameter Values: This is the central value of the prior gaussian
      #                   For now let's make this 1.0

      #  ParameterBounds: What are the lower+upper bounds of the parameter. If there is no bound set it to something large (e.g. ±9999)
      #                   As this is a normaliation parameter it's bounded below by 0 so we'll set the range to [0, 9999]
      #  Mode: What modes does it affect? (List)
      #        For DUNE modes are the following can be found in: SystematicConfigs/MaCh3Modes.yaml.
      #        For example CCQE=0, CC1Kaon=1, ...
      #        For now let's say this systematic only affects CCQE interactions so we'll set the mode to [0] 

      # SampleNames: This is the list of samples this object effects. We can do something like "MySample*" which 
      #              will apply to all samples with "MySample" in the name. Or we can do "MySample1, MySample2" to apply to specific samples.
      #              We'll match our sample so it's DDASBeamSample

      #  Type: Is this a spline, norm of func (shift) parameter?


      # /// EXTENSION ///
      # ================================================================================
      # As an extension you can also add kinematic cuts. These are of the form  
      # KinematicCuts:
      #    - <Name of Kinematic>: [lower bound, upper bound]

      # The kinematics are
      # - TrueNeutrinoEnergy: The true neutrino energy from the MC
      # - RecoNeutrinoEnergy: The reconstructed neutrino energy 
      # - TrueXPos: The true x position of the interaction vertex in the detector
      # - TrueYPos: The true y position of the interaction vertex in the detector
      # - TrueZPos: The true z position of the interaction vertex in the detector
      # - CVNNumu: CVN numu uncertainty
      # - CVNNue: CVN nue uncertainty
      # - Mode: The interaction mode
      # - OscillationChannel: The oscillation channel
      # - IsFHC: Whether the event is from a FHC beam
      # - TargetNucleus: The target nucleus
      # - IsTrueCCnue: Is the event a true CC nue interaction?
      # - IsTrueCCnumu: Is the event a true CC numu interaction?
      # ================================================================================
