# This is the config containing information about your systematics!
# Once you've you've defined your systematics here, you can list this file in the "XsecCovFile" entry of the "General" section of your RunConfig.yaml

# All systematic configs begin with a top level "Systematics"
Systematics:
  # Now for each systematic we put it under a "Systematic" entry
  - Systematic:
      # We can group parameters with a label (flux, xsec, osc, etc.). For now we'll say this is an xsec parameter
      ParameterGroup: Xsec

      # MaCh3 can have multiple names for the same systematic.
      Names:
        # We will be using "FancyName"
        FancyName:  #<- Call me DummyNorm!
      
        # Now we need to define some more  properties of the systematic:
        # These are:
        # This is the prior error
      Error: # For now let's make this 0.1

        # This is the central value of the prior gaussian. 
      ParameterValues: 
        Generated: #<- For now let's make this 1.0
        PreFitValue: # <- For now let's make this 1.0
      StepScale:
        MCMC: # <- Trying running MCMC with different values of me!
        # What are the lower+upper bounds of the parameter. If there is no bound set it to something large (e.g. ±9999)
      ParameterBounds: [lower, upper] #<- As this is a normaliation parameter it's bounded below by 0 so we'll set the range to [0, 9999]

        # What modes does it affect? (List) For DUNE modes are the following can be found in: SystematicConfigs/MaCh3Modes.yaml.
        # For example CCQE=0, CC1Kaon=1, ...
      Mode: [mode list] #<- For now let's say this systematic only affects CCQE interactions so we'll set the mode to [0] 

        # This is the list of samples this object effects. We can do something like "MySample*" which
        # will apply to all samples with "MySample" in the name. Or we can do "MySample1, MySample2" to apply to specific samples.
      SampleNames: [BeamFD] #<- We'll just include the name of the sample we created earlier
 
        # Is this a Spline, Norm or Func (shift) parameter?
      Type: #<- We're implementing a Norm, so put Norm here (the case matters!)

        # Here we can specify specific ranges which this systematic will apply to
        # Let's go with TrueNeutrinoEnergy with a range of [0.5, 1.0]
      KinematicCuts:
        - TrueNeutrinoEnergy: [lower, upper] # <- Now what do we set our cut to?