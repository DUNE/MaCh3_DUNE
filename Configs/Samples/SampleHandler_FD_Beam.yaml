SampleHandlerName: "BeamFD"
MaCh3ModeConfig: "Configs/CovObjs/MaCh3Modes.yaml"
BinningFile: "Configs/Samples/BeamParameterBinning.yaml"
InputFiles:
  PrepSplineFile: false

# NuOsc:
#   NuOscConfigFile: "Configs/NuOsc/CUDAProb3Linear_binned.yaml"
#   EqualBinningPerOscChannel: True

Samples: [
  "BeamFD_FHC_numu",
  "BeamFD_FHC_nue",
  "BeamFD_RHC_numu",
  "BeamFD_RHC_nue",
]

BeamFD_FHC_nue: 
  SampleName: "BeamFD_FHC_nue"
  SampleTitle: "BeamFD_FHC_nue"
  POT: 1.3628319e+23


  SelectionCuts:
    - KinematicStr: "TrueXPos"
      Bounds: [-310.0, 310.0]
    - KinematicStr: "TrueYPos"
      Bounds: [-550.0, 550.0]
    - KinematicStr: "TrueZPos"
      Bounds: [50.0, 1244.0]
