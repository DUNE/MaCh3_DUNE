  InputFiles:
    mtupleprefix: "Inputs/Atmospherics/CAFs/MC/MC_hd"
      #mtupleprefix: "Inputs/Atmospherics/CAFs/atm_hd"
    mtuplesuffix: "_nueselec.root"
    splineprefix: ""
    splinesuffix: ""

