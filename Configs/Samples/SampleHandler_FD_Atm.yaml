---
SampleHandlerName: "Atm"
MaCh3ModeConfig: "Configs/CovObjs/MaCh3Modes.yaml"
BinningFile: "Configs/Samples/AtmosphericParameterBinning.yaml"
InputFiles:
  PrepSplineFile: false

NuOsc:
  NuOscConfigFile: "Configs/NuOsc/CUDAProb3_SubSampling_ProdHAvg_EarthSysts.yaml"
  EqualBinningPerOscChannel: true

AnalysisOptions:
  ExposureScaling: 1.0

Samples: [
  "Atm_nuelike", "Atm_numulike"
]

